<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulcip Manage</title>
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem("pulcipTheme")
          const theme =
            storedTheme === "light" || storedTheme === "dark"
              ? storedTheme
              : window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark"
          document.documentElement.setAttribute("data-theme", theme)
        } catch {
          document.documentElement.setAttribute("data-theme", "dark")
        }
      })()
    </script>
    <style>
      #app-preloader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0f19;
        color: #e5ecff;
        font-family: "DM Sans", system-ui, -apple-system, sans-serif;
        z-index: 9999;
      }

      html[data-theme="light"] #app-preloader {
        background: #dbeafe;
        color: #1e3a8a;
      }
    </style>
  </head>
  <body>
    <div id="app-preloader">
      <div class="app-preloader__content">
        <span class="app-preloader__dot" aria-hidden="true"></span>
        <span class="app-preloader__text">Yukleniyor</span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
